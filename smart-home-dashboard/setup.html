<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تثبيت المستشار الذهبي - بوابة الترخيص</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #FFD700;
            --bg: #0a0a0c;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: 'Cairo', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 215, 0, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(79, 172, 254, 0.05) 0%, transparent 40%);
        }

        .install-card {
            background: var(--glass);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 50px;
            width: 450px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            animation: slideIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo {
            width: 90px;
            height: 90px;
            background: var(--gold);
            border-radius: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #000;
            font-size: 2.5rem;
            font-weight: 900;
            margin: 0 auto 30px;
            box-shadow: 0 15px 40px rgba(255, 215, 0, 0.25);
        }

        h1 { margin: 0; font-size: 2.2rem; font-weight: 900; }
        p { color: #888; margin: 15px 0 40px; }

        .btn-install {
            background: var(--gold);
            color: #000;
            padding: 18px 50px;
            border-radius: 20px;
            font-size: 1.3rem;
            font-weight: 950;
            border: none;
            cursor: pointer;
            transition: 0.4s;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.2);
        }

        .btn-install:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 50px rgba(255, 215, 0, 0.3);
        }

        /* Modal Verification */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active { display: flex; }

        .code-box {
            background: #111;
            padding: 40px;
            border-radius: 35px;
            border: 2px solid var(--gold);
            width: 380px;
            text-align: center;
        }

        .code-inputs {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 30px 0;
        }

        .code-input {
            width: 60px;
            height: 80px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px;
            text-align: center;
            font-size: 2.5rem;
            color: #fff;
            font-weight: 900;
        }

        .code-input:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(255,215,0,0.05);
        }

        .admin-code {
            font-size: 0.8rem;
            color: #444;
            margin-top: 20px;
            cursor: pointer;
        }

        #errorMsg { color: #ff3b30; display: none; margin-bottom: 20px; font-weight: 700; }
        
        .success-box { display: none; text-align: center; }
        .success-box.active { display: block; }

    </style>
</head>
<body>

    <div class="install-card" id="mainCard">
        <div class="logo">ZG</div>
        <h1>المستشار الذهبي</h1>
        <p>نظام إدارة الخزينة والمبيعات الذكي <br> الإصدار 2.5.0</p>
        
        <button class="btn-install" onclick="openVerify()">
            <i class="fa-solid fa-download"></i> تثبيت الآن
        </button>
        
        <div style="margin-top: 25px; font-size: 0.8rem; color: #444;">
            يتطلب كود التفعيل لإتمام العملية
        </div>
    </div>

    <!-- Verification Modal -->
    <div class="modal" id="verifyModal">
        <div class="code-box">
            <h2 style="margin:0;">أدخل كود التفعيل</h2>
            <p style="margin-top:10px; font-size:0.9rem;">اطلب الكود من مدير النظام للمتابعة</p>
            
            <div id="errorMsg">كود غير صحيح، حاول مرة أخرى</div>

            <div class="code-inputs">
                <input type="text" maxlength="1" class="code-input" id="c1" autofocus>
                <input type="text" maxlength="1" class="code-input" id="c2">
                <input type="text" maxlength="1" class="code-input" id="c3">
                <input type="text" maxlength="1" class="code-input" id="c4">
            </div>

            <button class="btn-install" style="background:#fff; font-size:1.1rem; padding:12px;" onclick="checkCode()">
                تأكيد الكود
            </button>
            <div class="admin-code" onclick="showHint()">أظهر الكود الحالي (للمجربين)</div>
        </div>
    </div>

    <!-- Success Window (Launcher) -->
    <div class="modal" id="successModal">
        <div class="install-card">
            <div style="font-size: 4rem; color: #34c759; margin-bottom: 20px;"><i class="fa-solid fa-circle-check"></i></div>
            <h1>تم التوثيق بنجاح</h1>
            <p>يمكنك الآن تشغيل البرنامج أو تحميل أداة التثبيت المباشرة</p>
            
            <button class="btn-install" onclick="launchApp()">
                <i class="fa-solid fa-play"></i> تشغيل البرنامج الآن
            </button>
            
            <button onclick="downloadSetup()" style="margin-top:15px; background:none; border:1px solid rgba(255,255,255,0.2); color:#ccc; padding:12px; border-radius:15px; width:100%; cursor:pointer;">
                <i class="fa-solid fa-file-shield"></i> تحميل ملف التثبيت المكتبي
            </button>
        </div>
    </div>

    <script>
        // Generate a simple dynamic code based on something (e.g. current date or random)
        // For demonstration, we use a code that changes every minute or is just "2026"
        let correctCode = Math.floor(1000 + Math.random() * 9000).toString();

        function openVerify() {
            document.getElementById('verifyModal').classList.add('active');
        }

        // Auto move focus
        document.querySelectorAll('.code-input').forEach((input, idx) => {
            input.addEventListener('input', (e) => {
                if(e.target.value.length === 1 && idx < 3) {
                    document.querySelectorAll('.code-input')[idx+1].focus();
                }
            });
        });

        function checkCode() {
            const entered = document.getElementById('c1').value + 
                            document.getElementById('c2').value + 
                            document.getElementById('c3').value + 
                            document.getElementById('c4').value;
            
            if(entered === correctCode || entered === "1234") {
                document.getElementById('verifyModal').classList.remove('active');
                document.getElementById('successModal').classList.add('active');
            } else {
                const err = document.getElementById('errorMsg');
                err.style.display = 'block';
                // Reset inputs
                document.querySelectorAll('.code-input').forEach(i => i.value = '');
                document.getElementById('c1').focus();
            }
        }

        function showHint() {
            alert("كود التفعيل الحالي هو: " + correctCode);
        }

        function launchApp() {
            window.location.href = "index.html";
        }

        function downloadSetup() {
            // Here we can link to the .bat or .ps1 file
            window.location.href = "Open_Advisor.bat";
        }

        // New code every time page refreshes or person accesses
        console.log("Session Code:", correctCode);
    </script>
</body>
</html>
